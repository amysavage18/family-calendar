<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savage Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4ff; --surface: #ffffff; --primary: #5b7fff; --primary-light: #e8edff;
    --text: #1a1d2e; --text-muted: #6b7280; --border: #e2e8f0;
    --today: #ff6b6b; --radius: 16px; --shadow: 0 4px 24px rgba(91,127,255,0.10);
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); z-index: 100; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .app-title { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

  .view-toggle { display: flex; background: var(--primary-light); border-radius: 12px; padding: 4px; gap: 4px; }
  .view-btn { border: none; background: transparent; border-radius: 9px; padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: var(--primary); transition: all 0.15s; }
  .view-btn.active { background: var(--primary); color: white; }

  .today-btn { border: 2px solid var(--primary); background: transparent; border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: var(--primary); transition: all 0.15s; }
  .today-btn:hover { background: var(--primary-light); }

  .slideshow-btn { background: linear-gradient(135deg, #ff6b9d, #f59e0b); border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: white; transition: opacity 0.15s; }
  .slideshow-btn:hover { opacity: 0.88; }

  .status-bar { background: #e8edff; padding: 5px 24px; font-size: 12px; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .calendar-frame { flex: 1; border: none; width: 100%; display: block; }

  /* SLIDESHOW */
  .ss-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 300; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
  .ss-overlay.open { display: flex; }
  .ss-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 1.2s ease; opacity: 0; filter: brightness(0.35); }
  .ss-bg.visible { opacity: 1; }
  .ss-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .ss-photo { max-width: 55vw; max-height: 55vh; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transition: opacity 0.8s ease; display: block; }
  .ss-photo.fade { opacity: 0; }
  .ss-clock { font-size: 68px; font-weight: 800; color: white; letter-spacing: -2px; margin-top: 20px; font-family: 'Nunito', sans-serif; line-height: 1; }
  .ss-date { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.75); margin-top: 4px; font-family: 'Nunito', sans-serif; }
  .ss-next { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); font-size: 15px; color: rgba(255,255,255,0.8); font-family: 'Nunito', sans-serif; font-weight: 700; text-align: center; padding: 8px 20px; background: rgba(255,255,255,0.12); border-radius: 20px; backdrop-filter: blur(4px); white-space: nowrap; }
  .ss-hint { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); font-size: 13px; color: rgba(255,255,255,0.35); font-family: 'Nunito', sans-serif; font-weight: 600; }
  .ss-dots { display: flex; gap: 6px; margin-top: 12px; }
  .ss-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.3s; }
  .ss-dot.active { background: white; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="app-title">&#127968; Savage Family Calendar</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="view-toggle">
      <button class="view-btn active" data-mode="month">Month</button>
      <button class="view-btn" data-mode="week">Week</button>
      <button class="view-btn" data-mode="day">Day</button>
      <button class="view-btn" data-mode="agenda">Agenda</button>
    </div>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="slideshow-btn" id="slideshowBtn">&#128248; Photos</button>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot"></span>
  <span>Live from Google Calendar &mdash; updates instantly when you add events</span>
</div>

<iframe
  id="calFrame"
  class="calendar-frame"
  src="https://calendar.google.com/calendar/embed?src=179000689e65f87192bc96c088bb26c1d4a2a2fa6299c14a91f8762be28d27a2%40group.calendar.google.com&ctz=America%2FLos_Angeles&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&mode=MONTH&color=%235b7fff"
  frameborder="0"
  scrolling="no"
  allowfullscreen>
</iframe>

<div class="ss-overlay" id="ssOverlay">
  <div class="ss-bg" id="ssBg"></div>
  <div class="ss-content">
    <img class="ss-photo" id="ssPhoto" src="" alt="Family photo" />
    <div class="ss-dots" id="ssDots"></div>
    <div class="ss-clock" id="ssClock">12:00</div>
    <div class="ss-date" id="ssDateStr">Wednesday, May 27</div>
  </div>
  <div class="ss-next" id="ssNext"></div>
  <div class="ss-hint">Tap anywhere to return to calendar</div>
</div>

<script>
const CAL_ID = "179000689e65f87192bc96c088bb26c1d4a2a2fa6299c14a91f8762be28d27a2%40group.calendar.google.com";
const TZ = "America%2FLos_Angeles";
const BASE = `https://calendar.google.com/calendar/embed?src=${CAL_ID}&ctz=${TZ}&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&color=%235b7fff`;

const PHOTO_IDS = [
  "AF1QipPF4BBXpyV96ZzdqUs5a3EjEsPffUCuQRtUvO8p","AF1QipOuvQiUZttY9ULh86aM2-4jJvU2ZdVsHtkpz2Al",
  "AF1QipM8l4s6g4suaImg31vo_LJ5jWlRJ-lvtjV0zIMQ","AF1QipPQxBBtA-p26ATSaIx52mJcG-x8vsq8OiZ_EaSg",
  "AF1QipOQs16k7nN7wikMvHVYEmcUHYsnYrQmrpCnWvdY","AF1QipMK2EFr6RUVSt7qfjO_82XrBU9Fg3tuB_05bDQA",
  "AF1QipMnHTAtr3YASP3YRD6eKaHZof6qmPF5jFlPUo6t","AF1QipODrRdMcksZEdwJfE-iggRRcXUShnYkeY1vJ_Qn",
  "AF1QipPDVbeZ9zQA_8cT_5JEQpqKqEEPo6uTrdYrwhSQ","AF1QipNoqh2SyNDudTTQGGqZSzsJB90ZIxb5yVRFduOG",
  "AF1QipNvGwq213YBODwu7jtfTW9h5IZOhKvnMDpjGTdV","AF1QipMM1OKyPyjbC0-YT_lgVoak57jy7w0_iTWiVYXb",
  "AF1QipOFh7MJi3Q2GDzIx0xI-2F3WMqGLl4OP1dF_F5J","AF1QipPsuXDYC6qnD-dlYHmswPMC8tlXZ9TESBoELVST",
  "AF1QipMTAH92M71nJjIbjiDhyuUGJzRr2mVutj0H2g5F","AF1QipOGdcV55fSou3vuyKEgR1_EhXmH4i2kVHMTV_SV",
  "AF1QipM-OxbXhJZ4FciAT8xkzpHKmjw8O0lyxIHByS0p","AF1QipP22BbyECLqgbeHD6PC_eqcuriknja1d4_4Xtbo",
  "AF1QipMXuro072hD-lp1QdugAkw_mqCivoKtu_QjRAW5","AF1QipMgjFzcoBnfeGEB4A1QpGNv0k8MGms0XJDSJ1BR",
  "AF1QipO3CfiPbBlsTavk8Eq80Ih4KocEbstBC1KhVYGj","AF1QipP0bXkh0heudsAlJPVb6tP5r7FqRjZpYbpUk2zM",
  "AF1QipM1iGqUjUuVMFMwR8K5-7h1KY5wYnyPL-gocPGc","AF1QipNuHm4mzmrssTAdUub8dOTDF8Z1pTtYkLvg7YDB",
  "AF1QipMB20VH2HBHTtjOw-CPpvedguF_4nOxNUkvfvU-","AF1QipOIHFrWx1W3qka4X13oJcfEQSRg5s66Q7CbCQOZ",
  "AF1QipN2RWH5LJgfMF3YaAIJj0qEF7F1lNWggq6y7PnA","AF1QipPrFl5B1gD0LbdAkK1KQRCy-Xb3ac4lTautvras",
  "AF1QipMEu6jRNUHVgPLJDXBycVXTksPLBBImWX5SKg6F","AF1QipPGn5UzIQUsVxEVfenbj_R3RsnowZbL278ttNHq"
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function photoUrl(id, size) { return `https://lh3.googleusercontent.com/pw/${id}=w${size}-h${size}-c`; }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// View toggle — reloads the iframe with the right mode
const frame = document.getElementById('calFrame');
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    frame.src = BASE + '&mode=' + btn.dataset.mode.toUpperCase();
  });
});

// Today button — reload iframe to today's date
document.getElementById('todayBtn').addEventListener('click', () => {
  const src = frame.src;
  frame.src = '';
  setTimeout(() => { frame.src = src; }, 50);
});

// SLIDESHOW
let ssPhotos = shuffle(PHOTO_IDS), ssIdx = 0, ssTimers = [], ssClockTimer = null;

function buildDots() {
  const el = document.getElementById('ssDots');
  el.innerHTML = ssPhotos.slice(0,10).map((_,i) => `<div class="ss-dot${i===0?' active':''}" id="dot${i}"></div>`).join('');
}
function updateDots() { document.querySelectorAll('.ss-dot').forEach((d,i) => { d.classList.toggle('active', i===ssIdx%10); }); }

function loadPhoto(id) {
  const img = document.getElementById('ssPhoto'), bg = document.getElementById('ssBg');
  img.classList.add('fade');
  setTimeout(() => {
    img.src = photoUrl(id, 800);
    bg.style.backgroundImage = `url(${photoUrl(id, 400)})`;
    img.onload = () => { img.classList.remove('fade'); bg.classList.add('visible'); };
    img.onerror = () => { img.src=''; img.classList.remove('fade'); };
  }, 400);
}

function nextPhoto() {
  ssIdx = (ssIdx+1) % ssPhotos.length;
  if (ssIdx === 0) ssPhotos = shuffle(PHOTO_IDS);
  loadPhoto(ssPhotos[ssIdx]);
  updateDots();
}

function formatTime(d) { let h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${m.toString().padStart(2,'0')} ${ap}`; }

function updateSsClock() {
  const now = new Date();
  let h=now.getHours(),m=now.getMinutes(),ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('ssClock').textContent = `${h}:${m.toString().padStart(2,'0')} ${ap}`;
  document.getElementById('ssDateStr').textContent = `${FULL_DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('ssNext').textContent = '';
}

function startSlideshow() {
  buildDots();
  loadPhoto(ssPhotos[0]);
  updateSsClock();
  ssTimers.push(setInterval(nextPhoto, 6000));
  ssClockTimer = setInterval(updateSsClock, 15000);
}

function stopSlideshow() {
  ssTimers.forEach(clearInterval); ssTimers = [];
  if (ssClockTimer) { clearInterval(ssClockTimer); ssClockTimer = null; }
  document.getElementById('ssBg').classList.remove('visible');
}

document.getElementById('slideshowBtn').addEventListener('click', () => {
  document.getElementById('ssOverlay').classList.add('open');
  startSlideshow();
});
document.getElementById('ssOverlay').addEventListener('click', () => {
  document.getElementById('ssOverlay').classList.remove('open');
  stopSlideshow();
});
</script>
</body>
</html>
