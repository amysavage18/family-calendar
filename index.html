<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savage Family Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f1e6;
    --paper: #fffdf8;
    --ink: #2c2a26;
    --muted: #6f675b;
    --sage: #7f9474;
    --sage-deep: #5f7356;
    --terracotta: #c96f4a;
    --line: #e3dac8;
    --shadow: 0 18px 40px -22px rgba(44, 42, 38, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(127, 148, 116, 0.14), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(201, 111, 74, 0.12), transparent 55%),
      var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  header {
    padding: 22px clamp(18px, 4vw, 48px) 14px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 5;
  }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .house { font-size: 28px; line-height: 1; filter: drop-shadow(0 4px 8px rgba(44,42,38,0.18)); }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(24px, 4vw, 36px);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  h1 .sub {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  .views {
    display: inline-flex;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px;
    box-shadow: var(--shadow);
  }
  .views button {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--muted);
    background: transparent;
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    transition: color .2s ease, background .2s ease;
    white-space: nowrap;
  }
  .views button:hover { color: var(--ink); }
  .views button.active {
    background: var(--sage);
    color: #fff;
    box-shadow: 0 6px 14px -6px rgba(95, 115, 86, 0.7);
  }

  main {
    flex: 1;
    padding: 4px clamp(14px, 4vw, 48px) clamp(14px, 4vw, 48px);
    min-height: 0;
    display: flex;
  }

  .panel { flex: 1; display: none; min-height: 0; }
  body[data-view="photos"]   .panel.photos   { display: flex; }
  body[data-view="calendar"] .panel.calendar { display: flex; }
  body[data-view="weather"]  .panel.weather  { display: flex; }

  /* ---------- Calendar ---------- */
  .frame {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 480px;
  }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* ---------- Photos slideshow ---------- */
  .slideshow {
    position: relative;
    flex: 1;
    border-radius: 22px;
    overflow: hidden;
    background: #1d1b18;
    box-shadow: var(--shadow);
    min-height: 480px;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .slide.show { opacity: 1; }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.02);
  }
  .slide.show img { animation: kenburns 9s ease-out forwards; }
  @keyframes kenburns {
    from { transform: scale(1.02); }
    to   { transform: scale(1.12); }
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: clamp(20px, 4vw, 48px);
    background: linear-gradient(to top, rgba(20,18,16,0.78) 0%, rgba(20,18,16,0.25) 32%, rgba(20,18,16,0) 60%);
    color: #fff;
    pointer-events: none;
  }
  .clock {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(56px, 12vw, 132px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    text-shadow: 0 6px 30px rgba(0,0,0,0.45);
  }
  .clock .ampm {
    font-size: 0.28em;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-left: 0.25em;
    vertical-align: baseline;
    opacity: 0.85;
  }
  .date {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: clamp(17px, 2.6vw, 26px);
    margin-top: 10px;
    opacity: 0.95;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .caption {
    font-size: clamp(13px, 1.8vw, 17px);
    margin-top: 14px;
    opacity: 0.9;
    max-width: 60ch;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    min-height: 1.2em;
  }

  /* ---------- Weather ---------- */
  .weather-card {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: clamp(22px, 4vw, 44px);
    display: flex;
    flex-direction: column;
    min-height: 480px;
  }
  .wx-now {
    display: flex;
    align-items: center;
    gap: clamp(16px, 4vw, 40px);
    flex-wrap: wrap;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .wx-icon { font-size: clamp(64px, 12vw, 110px); line-height: 1; }
  .wx-temp {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(58px, 12vw, 110px);
    line-height: 0.9;
    letter-spacing: -0.02em;
  }
  .wx-temp sup { font-size: 0.4em; top: -0.5em; }
  .wx-meta { display: flex; flex-direction: column; gap: 6px; }
  .wx-desc { font-size: clamp(18px, 2.4vw, 26px); font-weight: 600; }
  .wx-place { color: var(--muted); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
  .wx-sub { color: var(--muted); font-size: 15px; }
  .wx-sub span { color: var(--ink); font-weight: 600; }

  .wx-label {
    margin-top: 26px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .wx-hourly {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
  }
  .wx-hour {
    flex: 0 0 auto;
    width: 72px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 6px;
    text-align: center;
  }
  .wx-hour .hh { font-size: 13px; font-weight: 600; color: var(--muted); }
  .wx-hour .ic { font-size: 26px; margin: 6px 0; }
  .wx-hour .ht { font-weight: 600; }
  .wx-hour .pop { font-size: 11px; color: var(--sage-deep); margin-top: 2px; min-height: 1em; }

  .wx-forecast {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .wx-day {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 10px;
    text-align: center;
  }
  .wx-day .dow { font-weight: 600; font-size: 14px; color: var(--muted); }
  .wx-day .ic { font-size: 30px; margin: 8px 0; }
  .wx-day .hi { font-weight: 600; }
  .wx-day .lo { color: var(--muted); }
  .wx-state { margin: auto; color: var(--muted); font-size: 16px; text-align: center; }

  @media (max-width: 620px) {
    header { padding-bottom: 6px; }
    .views { width: 100%; justify-content: center; }
    main { padding-top: 0; }
    .wx-forecast { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body data-view="calendar">
  <header>
    <div class="brand">
      <span class="house">🏠</span>
      <h1>Savage Family Calendar<span class="sub">Home base</span></h1>
    </div>
    <nav class="views" role="tablist" aria-label="Choose view">
      <button data-view="photos" type="button">📸 Photos</button>
      <button data-view="calendar" class="active" type="button">📅 Calendar</button>
      <button data-view="weather" type="button">⛅ Weather</button>
    </nav>
  </header>

  <main>
    <!-- PHOTOS -->
    <section class="panel photos">
      <div class="slideshow" id="slideshow">
        <div class="slide" id="slideA"><img alt="Family photo"></div>
        <div class="slide" id="slideB"><img alt="Family photo"></div>
        <div class="photo-overlay">
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">&nbsp;</div>
          <div class="caption" id="caption">&nbsp;</div>
        </div>
      </div>
    </section>

    <!-- CALENDAR -->
    <section class="panel calendar">
      <div class="frame">
        <iframe id="cal" title="Savage Family Calendar"
          src="https://calendar.google.com/calendar/embed?src=179000689e65f87192bc96c088bb26c1d4a2a2fa6299c14a91f8762be28d27a2%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=MONTH&showTitle=0&showPrint=0&showTabs=1&showCalendars=0&showTz=0&wkst=1"
          frameborder="0" scrolling="no"></iframe>
      </div>
    </section>

    <!-- WEATHER -->
    <section class="panel weather">
      <div class="weather-card" id="weatherCard">
        <div class="wx-state" id="wxState">Loading weather…</div>
      </div>
    </section>
  </main>

  <script>
  /* ============================================================
     1) PHOTOS FROM YOUR GOOGLE PHOTOS ALBUM
     ------------------------------------------------------------
     Paste the Google Apps Script web-app URL between the quotes
     below (it ends in /exec). Setup steps are in the chat / the
     Code.gs file. When this is set, the slideshow pulls live from
     your album: "Savage Family Calendar".
        https://photos.app.goo.gl/31ei3x2BVzW9G6Sk6
     Leave it blank to just use the sample photos below.
     ============================================================ */
  const ALBUM_FEED_URL = "";   // <-- paste your .../exec URL here

  // Shown until/unless the album feed loads (also a safe fallback).
  const PHOTOS_FALLBACK = [
    { src: "https://picsum.photos/id/1015/1600/1000", caption: "📸 Set ALBUM_FEED_URL above to show your album photos" },
    { src: "https://picsum.photos/id/1016/1600/1000", caption: "" },
    { src: "https://picsum.photos/id/1018/1600/1000", caption: "" },
    { src: "https://picsum.photos/id/1039/1600/1000", caption: "" }
  ];

  const SLIDE_SECONDS = 8;     // seconds per photo

  /* ============================================================
     2) WEATHER LOCATION  — change these for your town.
     ============================================================ */
  const WX = {
    name: "Seattle, WA",
    latitude: 47.6062,
    longitude: -122.3321,
    timezone: "America/Los_Angeles",
    unit: "fahrenheit"         // "fahrenheit" or "celsius"
  };

  /* ---------------- Clock + date ---------------- */
  function tickClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, "0");
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12; if (h === 0) h = 12;
    document.getElementById("clock").innerHTML =
      h + ":" + m + '<span class="ampm">' + ampm + "</span>";
    document.getElementById("date").textContent =
      now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  }
  setInterval(tickClock, 1000);
  tickClock();

  /* ---------------- Photo slideshow ---------------- */
  let photos = PHOTOS_FALLBACK.slice();
  let slideTimer = null, idx = 0, layer = 0;
  const slides = [document.getElementById("slideA"), document.getElementById("slideB")];
  const slideImgs = [slides[0].querySelector("img"), slides[1].querySelector("img")];
  const captionEl = document.getElementById("caption");

  function renderSlide(i) {
    if (!photos.length) return;
    const next = (layer + 1) % 2;
    slideImgs[next].onload = function () {
      slides[next].classList.add("show");
      slides[layer].classList.remove("show");
      layer = next;
    };
    slideImgs[next].src = photos[i].src;
    captionEl.textContent = (photos[i].caption) ? photos[i].caption : "\u00a0";
  }

  function startSlideshow() {
    idx = 0;
    renderSlide(0);
    if (slideTimer) clearInterval(slideTimer);
    slideTimer = setInterval(function () {
      idx = (idx + 1) % photos.length;
      renderSlide(idx);
    }, SLIDE_SECONDS * 1000);
  }
  startSlideshow();

  // Called by the Apps Script feed (JSONP — avoids CORS issues).
  window.__albumLoaded = function (data) {
    if (data && data.photos && data.photos.length) {
      // light shuffle so the order varies each load
      const list = data.photos.slice();
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = list[i]; list[i] = list[j]; list[j] = t;
      }
      photos = list.map(function (u) { return { src: u, caption: "" }; });
      startSlideshow();
    }
  };

  if (ALBUM_FEED_URL) {
    const s = document.createElement("script");
    s.src = ALBUM_FEED_URL + (ALBUM_FEED_URL.indexOf("?") > -1 ? "&" : "?") + "callback=__albumLoaded";
    document.body.appendChild(s);
  }

  /* ---------------- View switching ---------------- */
  document.querySelectorAll(".views button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".views button").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      document.body.dataset.view = btn.dataset.view;
      if (btn.dataset.view === "weather") loadWeather();
    });
  });

  /* ---------------- Weather (Open-Meteo, no API key) ---------------- */
  function wxCode(code) {
    const map = {
      0: ["Clear sky", "☀️"], 1: ["Mainly clear", "🌤️"], 2: ["Partly cloudy", "⛅"],
      3: ["Overcast", "☁️"], 45: ["Fog", "🌫️"], 48: ["Rime fog", "🌫️"],
      51: ["Light drizzle", "🌦️"], 53: ["Drizzle", "🌦️"], 55: ["Heavy drizzle", "🌧️"],
      56: ["Freezing drizzle", "🌧️"], 57: ["Freezing drizzle", "🌧️"],
      61: ["Light rain", "🌦️"], 63: ["Rain", "🌧️"], 65: ["Heavy rain", "🌧️"],
      66: ["Freezing rain", "🌧️"], 67: ["Freezing rain", "🌧️"],
      71: ["Light snow", "🌨️"], 73: ["Snow", "🌨️"], 75: ["Heavy snow", "❄️"],
      77: ["Snow grains", "🌨️"], 80: ["Rain showers", "🌦️"], 81: ["Rain showers", "🌧️"],
      82: ["Heavy showers", "⛈️"], 85: ["Snow showers", "🌨️"], 86: ["Snow showers", "❄️"],
      95: ["Thunderstorm", "⛈️"], 96: ["Thunderstorm", "⛈️"], 99: ["Thunderstorm", "⛈️"]
    };
    return map[code] || ["—", "🌡️"];
  }

  let wxLoaded = false;
  function loadWeather() {
    if (wxLoaded) return;
    const card = document.getElementById("weatherCard");
    const unitSym = WX.unit === "celsius" ? "C" : "F";
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + WX.latitude +
      "&longitude=" + WX.longitude +
      "&current=temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m" +
      "&hourly=temperature_2m,weather_code,precipitation_probability" +
      "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
      "&temperature_unit=" + WX.unit +
      "&wind_speed_unit=" + (WX.unit === "celsius" ? "kmh" : "mph") +
      "&timezone=" + encodeURIComponent(WX.timezone) + "&forecast_days=5";

    fetch(url).then(function (r) { return r.json(); }).then(function (d) {
      const c = d.current, day = d.daily;
      const wc = wxCode(c.weather_code);
      const windUnit = WX.unit === "celsius" ? "km/h" : "mph";

      let forecast = "";
      for (let i = 0; i < day.time.length; i++) {
        const dt = new Date(day.time[i] + "T12:00:00");
        const dwc = wxCode(day.weather_code[i]);
        const dow = i === 0 ? "Today" : dt.toLocaleDateString(undefined, { weekday: "short" });
        forecast +=
          '<div class="wx-day"><div class="dow">' + dow + '</div>' +
          '<div class="ic">' + dwc[1] + '</div>' +
          '<div class="hi">' + Math.round(day.temperature_2m_max[i]) + '&deg;</div>' +
          '<div class="lo">' + Math.round(day.temperature_2m_min[i]) + '&deg;</div></div>';
      }

      // ----- Hourly: next 12 hours, starting at the current hour -----
      function hourLabel(iso, first) {
        if (first) return "Now";
        let hr = parseInt(iso.slice(11, 13), 10);     // "YYYY-MM-DDTHH:MM"
        const ap = hr >= 12 ? "PM" : "AM";
        hr = hr % 12; if (hr === 0) hr = 12;
        return hr + " " + ap;
      }
      let hourly = "";
      const hr = d.hourly;
      if (hr && hr.time && hr.time.length) {
        // current.time is in the forecast's timezone, e.g. "2026-05-29T14:30"
        const nowHour = (c.time || "").slice(0, 13);   // "YYYY-MM-DDTHH"
        let start = 0;
        for (let i = 0; i < hr.time.length; i++) {
          if (hr.time[i].slice(0, 13) >= nowHour) { start = i; break; }
        }
        const end = Math.min(start + 12, hr.time.length);
        for (let i = start; i < end; i++) {
          const hwc = wxCode(hr.weather_code[i]);
          const pop = hr.precipitation_probability ? hr.precipitation_probability[i] : null;
          hourly +=
            '<div class="wx-hour"><div class="hh">' + hourLabel(hr.time[i], i === start) + '</div>' +
            '<div class="ic">' + hwc[1] + '</div>' +
            '<div class="ht">' + Math.round(hr.temperature_2m[i]) + '&deg;</div>' +
            '<div class="pop">' + (pop != null && pop > 0 ? '💧' + pop + '%' : '&nbsp;') + '</div></div>';
        }
      }

      card.innerHTML =
        '<div class="wx-now">' +
          '<div class="wx-icon">' + wc[1] + '</div>' +
          '<div class="wx-temp">' + Math.round(c.temperature_2m) + '<sup>&deg;' + unitSym + '</sup></div>' +
          '<div class="wx-meta">' +
            '<div class="wx-desc">' + wc[0] + '</div>' +
            '<div class="wx-place">' + WX.name + '</div>' +
            '<div class="wx-sub">Feels like <span>' + Math.round(c.apparent_temperature) + '&deg;</span> &nbsp;·&nbsp; ' +
              'Humidity <span>' + c.relative_humidity_2m + '%</span> &nbsp;·&nbsp; ' +
              'Wind <span>' + Math.round(c.wind_speed_10m) + ' ' + windUnit + '</span></div>' +
          '</div>' +
        '</div>' +
        '<div class="wx-label">Next 12 hours</div>' +
        '<div class="wx-hourly">' + hourly + '</div>' +
        '<div class="wx-label">5-day forecast</div>' +
        '<div class="wx-forecast">' + forecast + '</div>';
      wxLoaded = true;
    }).catch(function () {
      card.innerHTML = '<div class="wx-state">Couldn\u2019t load the weather right now. ' +
        'Check the internet connection and tap Weather again.</div>';
    });
  }
  </script>
</body>
</html>
