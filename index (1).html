<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savage Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4ff; --surface: #ffffff; --primary: #5b7fff; --primary-light: #e8edff;
    --text: #1a1d2e; --text-muted: #6b7280; --border: #e2e8f0;
    --today: #ff6b6b; --radius: 16px; --shadow: 0 4px 24px rgba(91,127,255,0.10);
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .app-title { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .nav-btn { background: var(--primary-light); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 20px; cursor: pointer; color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; transition: background 0.15s; }
  .nav-btn:hover { background: #d0daff; }
  .month-label { font-size: 18px; font-weight: 800; min-width: 180px; text-align: center; }
  .view-toggle { display: flex; background: var(--primary-light); border-radius: 12px; padding: 4px; gap: 4px; }
  .view-btn { border: none; background: transparent; border-radius: 9px; padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: var(--primary); transition: all 0.15s; }
  .view-btn.active { background: var(--primary); color: white; }
  .today-btn { border: 2px solid var(--primary); background: transparent; border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: var(--primary); transition: all 0.15s; }
  .today-btn:hover { background: var(--primary-light); }
  .slideshow-btn { background: linear-gradient(135deg, #ff6b9d, #f59e0b); border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: white; transition: opacity 0.15s; }
  .slideshow-btn:hover { opacity: 0.88; }
  .refresh-btn { background: var(--primary-light); border: 2px solid var(--primary); border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; color: var(--primary); display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .refresh-btn:hover { background: #d0daff; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-icon { display: inline-block; font-size: 15px; }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { background: #e8edff; padding: 5px 24px; font-size: 12px; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { flex: 1; padding: 16px 24px; overflow: auto; }
  .month-grid-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--primary); padding: 10px 0; }
  .day-header { text-align: center; font-size: 13px; font-weight: 800; color: white; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-cell { min-height: 90px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 5px; cursor: pointer; transition: background 0.12s; }
  .day-cell:hover { background: #f8faff; }
  .day-cell.other-month { background: #f9fafb; }
  .day-cell.other-month .day-num { color: #d1d5db; }
  .day-cell.is-today .day-num { background: var(--today); color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 13px; font-weight: 700; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  .event-pill { font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; color: white; }
  .more-events { font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 1px 3px; }
  .week-view { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .week-header-row { display: grid; grid-template-columns: 56px repeat(7, 1fr); background: var(--primary); }
  .week-time-corner { background: var(--primary); }
  .week-day-head { padding: 8px 4px; text-align: center; color: white; font-size: 12px; font-weight: 800; }
  .week-day-head .wday { font-size: 10px; opacity: 0.8; }
  .week-day-head .wnum { font-size: 18px; font-weight: 800; display: block; }
  .week-day-head.is-today .wnum { background: var(--today); border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; }
  .week-body { overflow-y: auto; max-height: calc(100vh - 240px); }
  .week-hour-row { display: grid; grid-template-columns: 56px repeat(7, 1fr); border-bottom: 1px solid var(--border); min-height: 48px; }
  .hour-label { font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 4px 6px; text-align: right; border-right: 1px solid var(--border); padding-top: 5px; }
  .week-cell { border-right: 1px solid var(--border); padding: 2px 3px; min-height: 48px; }
  .week-event-pill { font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 4px; margin-bottom: 2px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .day-view { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .day-view-header { background: var(--primary); padding: 16px 24px; color: white; }
  .day-view-title { font-size: 20px; font-weight: 800; }
  .day-body { overflow-y: auto; max-height: calc(100vh - 240px); }
  .day-hour-row { display: grid; grid-template-columns: 70px 1fr; border-bottom: 1px solid var(--border); min-height: 60px; }
  .day-events-col { padding: 4px 8px; }
  .day-event-card { border-radius: 10px; padding: 6px 10px; margin-bottom: 4px; color: white; cursor: pointer; }
  .day-event-title { font-size: 14px; font-weight: 700; }
  .day-event-time { font-size: 12px; opacity: 0.85; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; padding: 28px; max-width: 400px; width: 90%; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: #f3f4f6; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
  .modal-color-bar { height: 6px; border-radius: 3px; margin-bottom: 16px; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .modal-detail { font-size: 14px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
  .ss-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 300; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
  .ss-overlay.open { display: flex; }
  .ss-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 1.2s ease; opacity: 0; filter: brightness(0.35); }
  .ss-bg.visible { opacity: 1; }
  .ss-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .ss-photo { max-width: 55vw; max-height: 55vh; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transition: opacity 0.8s ease; display: block; }
  .ss-photo.fade { opacity: 0; }
  .ss-clock { font-size: 68px; font-weight: 800; color: white; letter-spacing: -2px; margin-top: 20px; font-family: 'Nunito', sans-serif; line-height: 1; }
  .ss-date { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.75); margin-top: 4px; font-family: 'Nunito', sans-serif; }
  .ss-next { position: fixed; bottom: 56px; font-size: 15px; color: rgba(255,255,255,0.8); font-family: 'Nunito', sans-serif; font-weight: 700; text-align: center; padding: 8px 20px; background: rgba(255,255,255,0.12); border-radius: 20px; backdrop-filter: blur(4px); }
  .ss-hint { position: fixed; bottom: 22px; font-size: 13px; color: rgba(255,255,255,0.35); font-family: 'Nunito', sans-serif; font-weight: 600; }
  .ss-dots { display: flex; gap: 6px; margin-top: 12px; }
  .ss-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.3s; }
  .ss-dot.active { background: white; }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 16px; font-weight: 600; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--primary-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  .error-msg { text-align: center; padding: 40px 20px; color: #ef4444; font-weight: 700; font-size: 15px; line-height: 1.8; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="app-title">&#127968; Savage Family Calendar</div>
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <div class="month-label" id="monthLabel">Loading...</div>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="view-toggle">
      <button class="view-btn active" data-view="month">Month</button>
      <button class="view-btn" data-view="week">Week</button>
      <button class="view-btn" data-view="day">Day</button>
    </div>
    <button class="refresh-btn" id="refreshBtn"><span class="refresh-icon">&#128260;</span> Refresh</button>
    <button class="slideshow-btn" id="slideshowBtn">&#128248; Photos</button>
  </div>
</div>
<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Connecting to your calendar...</span>
</div>
<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading your family calendar...</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <div class="modal-color-bar" id="modalColorBar"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-detail" id="modalDate">&#128197; <span></span></div>
    <div class="modal-detail" id="modalTime">&#128336; <span></span></div>
    <div class="modal-detail" id="modalLocation" style="display:none">&#128205; <span></span></div>
    <div class="modal-detail" id="modalDesc" style="display:none">&#128221; <span></span></div>
  </div>
</div>
<div class="ss-overlay" id="ssOverlay">
  <div class="ss-bg" id="ssBg"></div>
  <div class="ss-content">
    <img class="ss-photo" id="ssPhoto" src="" alt="Family photo" />
    <div class="ss-dots" id="ssDots"></div>
    <div class="ss-clock" id="ssClock">12:00</div>
    <div class="ss-date" id="ssDateStr">Wednesday, May 27</div>
  </div>
  <div class="ss-next" id="ssNext"></div>
  <div class="ss-hint">Tap anywhere to return to calendar</div>
</div>
<script>
const ICAL_URL = "https://calendar.google.com/calendar/ical/179000689e65f87192bc96c088bb26c1d4a2a2fa6299c14a91f8762be28d27a2%40group.calendar.google.com/public/basic.ics";
const REFRESH_INTERVAL_MS = 15 * 60 * 1000;

// Multiple CORS proxies — tried in order until one works
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`
];

const PHOTO_IDS = [
  "AF1QipPF4BBXpyV96ZzdqUs5a3EjEsPffUCuQRtUvO8p","AF1QipOuvQiUZttY9ULh86aM2-4jJvU2ZdVsHtkpz2Al",
  "AF1QipM8l4s6g4suaImg31vo_LJ5jWlRJ-lvtjV0zIMQ","AF1QipPQxBBtA-p26ATSaIx52mJcG-x8vsq8OiZ_EaSg",
  "AF1QipOQs16k7nN7wikMvHVYEmcUHYsnYrQmrpCnWvdY","AF1QipMK2EFr6RUVSt7qfjO_82XrBU9Fg3tuB_05bDQA",
  "AF1QipMnHTAtr3YASP3YRD6eKaHZof6qmPF5jFlPUo6t","AF1QipODrRdMcksZEdwJfE-iggRRcXUShnYkeY1vJ_Qn",
  "AF1QipPDVbeZ9zQA_8cT_5JEQpqKqEEPo6uTrdYrwhSQ","AF1QipNoqh2SyNDudTTQGGqZSzsJB90ZIxb5yVRFduOG",
  "AF1QipNvGwq213YBODwu7jtfTW9h5IZOhKvnMDpjGTdV","AF1QipMM1OKyPyjbC0-YT_lgVoak57jy7w0_iTWiVYXb",
  "AF1QipOFh7MJi3Q2GDzIx0xI-2F3WMqGLl4OP1dF_F5J","AF1QipPsuXDYC6qnD-dlYHmswPMC8tlXZ9TESBoELVST",
  "AF1QipMTAH92M71nJjIbjiDhyuUGJzRr2mVutj0H2g5F","AF1QipOGdcV55fSou3vuyKEgR1_EhXmH4i2kVHMTV_SV",
  "AF1QipM-OxbXhJZ4FciAT8xkzpHKmjw8O0lyxIHByS0p","AF1QipP22BbyECLqgbeHD6PC_eqcuriknja1d4_4Xtbo",
  "AF1QipMXuro072hD-lp1QdugAkw_mqCivoKtu_QjRAW5","AF1QipMgjFzcoBnfeGEB4A1QpGNv0k8MGms0XJDSJ1BR",
  "AF1QipO3CfiPbBlsTavk8Eq80Ih4KocEbstBC1KhVYGj","AF1QipP0bXkh0heudsAlJPVb6tP5r7FqRjZpYbpUk2zM",
  "AF1QipM1iGqUjUuVMFMwR8K5-7h1KY5wYnyPL-gocPGc","AF1QipNuHm4mzmrssTAdUub8dOTDF8Z1pTtYkLvg7YDB",
  "AF1QipMB20VH2HBHTtjOw-CPpvedguF_4nOxNUkvfvU-","AF1QipOIHFrWx1W3qka4X13oJcfEQSRg5s66Q7CbCQOZ",
  "AF1QipN2RWH5LJgfMF3YaAIJj0qEF7F1lNWggq6y7PnA","AF1QipPrFl5B1gD0LbdAkK1KQRCy-Xb3ac4lTautvras",
  "AF1QipMEu6jRNUHVgPLJDXBycVXTksPLBBImWX5SKg6F","AF1QipPGn5UzIQUsVxEVfenbj_R3RsnowZbL278ttNHq"
];

const EVENT_COLORS = ['#5b7fff','#ff6b9d','#22c55e','#f59e0b','#8b5cf6','#ef4444','#06b6d4'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let allEvents=[], currentDate=new Date(), currentView='month', colorMap={}, colorIdx=0, refreshTimer=null;

function photoUrl(id,size){return`https://lh3.googleusercontent.com/pw/${id}=w${size}-h${size}-c`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getEventColor(t){const k=t.toLowerCase().substring(0,15);if(!colorMap[k]){colorMap[k]=EVENT_COLORS[colorIdx%EVENT_COLORS.length];colorIdx++;}return colorMap[k];}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function formatTime(d){if(!d)return'';let h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return`${h}:${m.toString().padStart(2,'0')} ${ap}`;}
function eventsForDay(date){return allEvents.filter(e=>{if(e.allDay){const s=new Date(e.start);s.setHours(0,0,0,0);const en=e.end?new Date(e.end):new Date(s);en.setHours(0,0,0,0);const dv=new Date(date);dv.setHours(0,0,0,0);return dv>=s&&dv<en||isSameDay(dv,s);}return isSameDay(e.start,date);});}
function parseICSDate(s){if(!s)return null;s=s.replace(/^[^:]+:/,'');if(s.length===8)return new Date(+s.substr(0,4),+s.substr(4,2)-1,+s.substr(6,2));const y=+s.substr(0,4),mo=+s.substr(4,2)-1,d=+s.substr(6,2),h=+s.substr(9,2)||0,mi=+s.substr(11,2)||0;return s.endsWith('Z')?new Date(Date.UTC(y,mo,d,h,mi)):new Date(y,mo,d,h,mi);}
function parseICS(text){const events=[];const blocks=text.split('BEGIN:VEVENT');for(let i=1;i<blocks.length;i++){const block=blocks[i];const get=(key)=>{const m=block.match(new RegExp(key+'[^:]*:([^\\r\\n]+)','i'));return m?m[1].trim():'';};const summary=get('SUMMARY').replace(/\\,/g,',').replace(/\\n/g,' ');const dtstart=get('DTSTART'),dtend=get('DTEND');const location=get('LOCATION').replace(/\\,/g,',');const description=get('DESCRIPTION').replace(/\\n/g,' ').replace(/\\,/g,',').substring(0,200);const rrule=get('RRULE');if(!summary||!dtstart)continue;const start=parseICSDate(dtstart),end=parseICSDate(dtend||dtstart);const allDay=dtstart.replace(/^[^:]+:/,'').length===8;if(start)events.push({summary,start,end,location,description,allDay,rrule,color:getEventColor(summary)});if(rrule&&start){const freq=(rrule.match(/FREQ=([A-Z]+)/)||[])[1];const count=parseInt((rrule.match(/COUNT=(\d+)/)||[,20])[1]);const until=(rrule.match(/UNTIL=([0-9T]+)/)||[])[1];const interval=parseInt((rrule.match(/INTERVAL=(\d+)/)||[,1])[1])||1;const endDate=until?parseICSDate(until):new Date(start.getTime()+180*86400000);const maxEnd=new Date(start.getTime()+365*86400000);const stopAt=endDate<maxEnd?endDate:maxEnd;let step=freq==='WEEKLY'?7*interval:freq==='DAILY'?interval:freq==='MONTHLY'?30*interval:null;if(step){let d=new Date(start);d.setDate(d.getDate()+step);let n=1;while(d<=stopAt&&n<count){const e2=new Date(d),e2end=end?new Date(d.getTime()+(end-start)):new Date(d);events.push({summary,start:e2,end:e2end,location,description,allDay,color:getEventColor(summary)});d.setDate(d.getDate()+step);n++;}}}}return events;}

// Fetch with automatic proxy fallback
async function fetchWithFallback(url) {
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    try {
      const proxyUrl = CORS_PROXIES[i](url) + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (res.ok) {
        const text = await res.text();
        if (text.includes('BEGIN:VCALENDAR')) return text; // valid iCal response
      }
    } catch(e) { /* try next proxy */ }
  }
  throw new Error('All proxies failed');
}

async function loadCalendar(silent=false) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.disabled = true;
  if (!silent) document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Loading your family calendar...</div>';
  try {
    const text = await fetchWithFallback(ICAL_URL);
    colorMap={}; colorIdx=0;
    allEvents = parseICS(text);
    const now = new Date();
    document.getElementById('statusText').textContent = `\u2713 ${allEvents.length} events \u00b7 Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} \u00b7 Auto-refreshes every 15 min`;
    document.getElementById('statusDot').style.background = '#22c55e';
    render();
  } catch(e) {
    document.getElementById('statusDot').style.background = '#ef4444';
    document.getElementById('statusText').textContent = '\u26a0\ufe0f Could not load calendar \u2014 will retry in 15 minutes';
    if (!silent) document.getElementById('mainContent').innerHTML = '<div class="error-msg">\u26a0\ufe0f Could not load calendar data.<br><br>Make sure your Google Calendar is set to <strong>public</strong> and try tapping Refresh.<br><br>If it keeps failing, the calendar URL may need to be re-copied from Google Calendar settings.</div>';
  }
  btn.classList.remove('spinning');
  setTimeout(()=>{ btn.disabled = false; }, 3000);
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(()=>loadCalendar(true), REFRESH_INTERVAL_MS);
}

function render(){updateMonthLabel();if(currentView==='month')renderMonth();else if(currentView==='week')renderWeek();else renderDay();}
function updateMonthLabel(){if(currentView==='month')document.getElementById('monthLabel').textContent=`${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;else if(currentView==='week'){const ws=new Date(currentDate);ws.setDate(ws.getDate()-ws.getDay());const we=new Date(ws);we.setDate(we.getDate()+6);document.getElementById('monthLabel').textContent=`${MONTHS[ws.getMonth()]} ${ws.getDate()} \u2013 ${ws.getMonth()!==we.getMonth()?MONTHS[we.getMonth()]+' ':''}${we.getDate()}`;}else document.getElementById('monthLabel').textContent=`${DAYS[currentDate.getDay()]}, ${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}`;}
function eBtn(e){return`onclick="showEvent(event,'${encodeURIComponent(JSON.stringify({s:e.summary,st:e.start.toISOString(),en:e.end?e.end.toISOString():'',lo:e.location,de:e.description,al:e.allDay,co:e.color}))}')"` ;}
function renderMonth(){const today=new Date(),year=currentDate.getFullYear(),month=currentDate.getMonth();const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate(),daysInPrev=new Date(year,month,0).getDate();let html=`<div class="month-grid-wrap"><div class="day-headers">${DAYS.map(d=>`<div class="day-header">${d}</div>`).join('')}</div><div class="month-grid">`;for(let i=0;i<42;i++){let day,thisMonth=true,mo=month,yr=year;if(i<firstDay){day=daysInPrev-firstDay+i+1;thisMonth=false;mo=month-1;if(mo<0){mo=11;yr--;}}else if(i>=firstDay+daysInMonth){day=i-firstDay-daysInMonth+1;thisMonth=false;mo=month+1;if(mo>11){mo=0;yr++;}}else{day=i-firstDay+1;}const cd=new Date(yr,mo,day),isToday=isSameDay(cd,today),dayEvents=eventsForDay(cd);const evHtml=dayEvents.slice(0,3).map(e=>`<div class="event-pill" style="background:${e.color}" ${eBtn(e)}>${e.summary}</div>`).join('');const more=dayEvents.length>3?`<div class="more-events">+${dayEvents.length-3} more</div>`:'';html+=`<div class="day-cell${thisMonth?'':' other-month'}${isToday?' is-today':''}"><div class="day-num">${day}</div>${evHtml}${more}</div>`;}html+='</div></div>';document.getElementById('mainContent').innerHTML=html;}
function renderWeek(){const today=new Date(),ws=new Date(currentDate);ws.setDate(ws.getDate()-ws.getDay());ws.setHours(0,0,0,0);const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});const hours=Array.from({length:16},(_,i)=>i+7);let html=`<div class="week-view"><div class="week-header-row"><div class="week-time-corner"></div>`;days.forEach(d=>{const it=isSameDay(d,today);html+=`<div class="week-day-head${it?' is-today':''}"><div class="wday">${DAYS[d.getDay()]}</div><span class="wnum">${d.getDate()}</span></div>`;});html+='</div>';let allDayRow=`<div class="week-hour-row"><div class="hour-label" style="font-size:9px">all day</div>`;days.forEach(d=>{const ev=eventsForDay(d).filter(e=>e.allDay);allDayRow+=`<div class="week-cell">${ev.map(e=>`<div class="week-event-pill" style="background:${e.color}" ${eBtn(e)}>${e.summary}</div>`).join('')}</div>`;});allDayRow+='</div>';let bodyHtml='<div class="week-body">'+allDayRow;hours.forEach(h=>{const label=h===12?'12 PM':h<12?`${h} AM`:`${h-12} PM`;bodyHtml+=`<div class="week-hour-row"><div class="hour-label">${label}</div>`;days.forEach(d=>{const ev=eventsForDay(d).filter(e=>!e.allDay&&e.start.getHours()===h);bodyHtml+=`<div class="week-cell">${ev.map(e=>`<div class="week-event-pill" style="background:${e.color}" ${eBtn(e)}>${e.summary}</div>`).join('')}</div>`;});bodyHtml+='</div>';});html+=bodyHtml+'</div></div>';document.getElementById('mainContent').innerHTML=html;}
function renderDay(){const today=new Date(),isToday=isSameDay(currentDate,today);const dayName=`${DAYS[currentDate.getDay()]}, ${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}, ${currentDate.getFullYear()}`;const hours=Array.from({length:17},(_,i)=>i+7);let html=`<div class="day-view"><div class="day-view-header"><div class="day-view-title">${isToday?'&#128197; Today \u2014 ':''}${dayName}</div></div><div class="day-body">`;const allDay=eventsForDay(currentDate).filter(e=>e.allDay);if(allDay.length){html+=`<div class="day-hour-row"><div class="hour-label" style="font-size:10px">All day</div><div class="day-events-col">`;allDay.forEach(e=>{html+=`<div class="day-event-card" style="background:${e.color}" ${eBtn(e)}><div class="day-event-title">${e.summary}</div></div>`;});html+='</div></div>';}hours.forEach(h=>{const label=h===12?'12:00 PM':h<12?`${h}:00 AM`:`${h-12}:00 PM`;const ev=eventsForDay(currentDate).filter(e=>!e.allDay&&e.start.getHours()===h);html+=`<div class="day-hour-row"><div class="hour-label">${label}</div><div class="day-events-col">`;ev.forEach(e=>{html+=`<div class="day-event-card" style="background:${e.color}" ${eBtn(e)}><div class="day-event-title">${e.summary}</div><div class="day-event-time">${formatTime(e.start)}${e.end?' \u2013 '+formatTime(e.end):''}</div></div>`;});html+='</div></div>';});html+='</div></div>';document.getElementById('mainContent').innerHTML=html;}
window.showEvent=function(evt,dataStr){evt.stopPropagation();const d=JSON.parse(decodeURIComponent(dataStr));const start=new Date(d.st),end=d.en?new Date(d.en):null;document.getElementById('modalTitle').textContent=d.s;document.getElementById('modalColorBar').style.background=d.co;document.getElementById('modalDate').querySelector('span').textContent=`${DAYS[start.getDay()]}, ${MONTHS[start.getMonth()]} ${start.getDate()}, ${start.getFullYear()}`;const timeEl=document.getElementById('modalTime');if(d.al){timeEl.querySelector('span').textContent='All day';}else{timeEl.querySelector('span').textContent=formatTime(start)+(end?' \u2013 '+formatTime(end):'');}const locEl=document.getElementById('modalLocation');if(d.lo){locEl.style.display='flex';locEl.querySelector('span').textContent=d.lo;}else locEl.style.display='none';const descEl=document.getElementById('modalDesc');if(d.de){descEl.style.display='flex';descEl.querySelector('span').textContent=d.de;}else descEl.style.display='none';document.getElementById('modalOverlay').classList.add('open');};
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');});
document.querySelectorAll('.view-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.view;render();});});
document.getElementById('prevBtn').addEventListener('click',()=>{if(currentView==='month')currentDate.setMonth(currentDate.getMonth()-1);else if(currentView==='week')currentDate.setDate(currentDate.getDate()-7);else currentDate.setDate(currentDate.getDate()-1);render();});
document.getElementById('nextBtn').addEventListener('click',()=>{if(currentView==='month')currentDate.setMonth(currentDate.getMonth()+1);else if(currentView==='week')currentDate.setDate(currentDate.getDate()+7);else currentDate.setDate(currentDate.getDate()+1);render();});
document.getElementById('todayBtn').addEventListener('click',()=>{currentDate=new Date();render();});
document.getElementById('refreshBtn').addEventListener('click',()=>loadCalendar(true));
let ssPhotos=shuffle(PHOTO_IDS),ssIdx=0,ssTimers=[],ssClockTimer=null;
function buildDots(){const el=document.getElementById('ssDots');el.innerHTML=ssPhotos.slice(0,10).map((_,i)=>`<div class="ss-dot${i===0?' active':''}" id="dot${i}"></div>`).join('');}
function updateDots(){document.querySelectorAll('.ss-dot').forEach((d,i)=>{d.classList.toggle('active',i===ssIdx%10);});}
function loadPhoto(id){const img=document.getElementById('ssPhoto'),bg=document.getElementById('ssBg');img.classList.add('fade');setTimeout(()=>{img.src=photoUrl(id,800);bg.style.backgroundImage=`url(${photoUrl(id,400)})`;img.onload=()=>{img.classList.remove('fade');bg.classList.add('visible');};img.onerror=()=>{img.src='';img.classList.remove('fade');};},400);}
function nextPhoto(){ssIdx=(ssIdx+1)%ssPhotos.length;if(ssIdx===0)ssPhotos=shuffle(PHOTO_IDS);loadPhoto(ssPhotos[ssIdx]);updateDots();}
function updateSsClock(){const now=new Date();let h=now.getHours(),m=now.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;document.getElementById('ssClock').textContent=`${h}:${m.toString().padStart(2,'0')} ${ap}`;document.getElementById('ssDateStr').textContent=`${FULL_DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;const upcoming=allEvents.filter(e=>e.start>now).sort((a,b)=>a.start-b.start)[0];if(upcoming){const diff=Math.round((upcoming.start-now)/60000);const ts=diff<60?`in ${diff} min`:diff<1440?`at ${formatTime(upcoming.start)}`:`${MONTHS[upcoming.start.getMonth()]} ${upcoming.start.getDate()}`;document.getElementById('ssNext').textContent=`\u{1F4C5} Next: ${upcoming.summary} \u2014 ${ts}`;}else document.getElementById('ssNext').textContent='';}
function startSlideshow(){buildDots();loadPhoto(ssPhotos[0]);updateSsClock();ssTimers.push(setInterval(nextPhoto,6000));ssClockTimer=setInterval(updateSsClock,15000);}
function stopSlideshow(){ssTimers.forEach(clearInterval);ssTimers=[];if(ssClockTimer){clearInterval(ssClockTimer);ssClockTimer=null;}document.getElementById('ssBg').classList.remove('visible');}
document.getElementById('slideshowBtn').addEventListener('click',()=>{document.getElementById('ssOverlay').classList.add('open');startSlideshow();});
document.getElementById('ssOverlay').addEventListener('click',()=>{document.getElementById('ssOverlay').classList.remove('open');stopSlideshow();});
loadCalendar();
</script>
</body>
</html>
